# Databricks App Configuration for NSW EV Intelligence Platform

name: nsw-ev-intelligence-app
description: "NSW EV Intelligence Platform - Consumer location intelligence for EV drivers"

# App runtime configuration
runtime:
  type: flask
  entry_point: app.py
  port: 8080

# Compute configuration
compute:
  cluster_size: small  # Small cluster is sufficient for API serving
  
# Environment variables
environment:
  FLASK_ENV: production
  PYTHONPATH: /Workspace/Users/moeedk1@gmail.com/NSW-EV-Intelligence-Platform/nsw-ev-intelligence

# Resource access
resources:
  - type: table
    catalog: mobility_ai
    schema: gold
    tables:
      - charger_recommendations_smart
      - charger_recommendations_nearest
      - regional_infrastructure_metrics
      - congestion_forecast_location
      - congestion_forecast_hourly
      - trip_routes_optimal
      - trip_charging_requirements
      - trip_recommendations

# App metadata
metadata:
  version: "1.0.0"
  author: "NSW EV Intelligence Team"
  tags:
    - ev-charging
    - location-intelligence
    - consumer-app
    - real-time
  
# Permissions
permissions:
  - type: table_read
    catalog: mobility_ai
    schema: gold