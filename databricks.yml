# Databricks Bundle Configuration for NSW EV Intelligence Platform
bundle:
  name: nsw-ev-intelligence

# Variables
variables:
  workspace_url:
    description: "Databricks workspace URL"
    default: "https://dbc-4971914a-f8a7.cloud.databricks.com"
  catalog:
    description: "Unity Catalog name for data storage"
    default: "mobility_ai"

# Workspace settings
workspace:
  root_path: "/Workspace/Users/moeedk1@gmail.com/.bundle/${bundle.name}/${bundle.target}"

# Targets (environments)
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: "${var.workspace_url}"
    resources:
      apps:
        nsw_ev_platform:
          name: "nsw-ev-platform-dev"
          description: "NSW EV Intelligence Platform - Development"
          source_code_path: "${workspace.file_path}/nsw-ev-intelligence/ui"
      pipelines:
        bronze_ingestion:
          name: "nsw-ev-bronze-pipeline-dev"
          target: "${var.catalog}.bronze"
          
  staging:
    mode: development
    workspace:
      host: "${var.workspace_url}"
    resources:
      apps:
        nsw_ev_platform:
          name: "nsw-ev-platform-staging"
          description: "NSW EV Intelligence Platform - Staging"
          source_code_path: "${workspace.file_path}/nsw-ev-intelligence/ui"
      pipelines:
        bronze_ingestion:
          name: "nsw-ev-bronze-pipeline-staging"
          target: "${var.catalog}.bronze"
  
  prod:
    mode: production
    workspace:
      host: "${var.workspace_url}"
    resources:
      apps:
        nsw_ev_platform:
          name: "nsw-ev-platform-prod"
          description: "NSW EV Intelligence Platform - Production"
          source_code_path: "${workspace.file_path}/nsw-ev-intelligence/ui"
      pipelines:
        bronze_ingestion:
          name: "nsw-ev-bronze-pipeline-prod"
          target: "${var.catalog}.bronze"

# Default resources
resources:
  apps:
    nsw_ev_platform:
      name: "nsw-ev-platform-${bundle.target}"
      description: "NSW EV Intelligence Platform - Real-time dashboards for EV infrastructure, traffic forecasting, and trip planning"
      source_code_path: "${workspace.file_path}/nsw-ev-intelligence/ui"
    
    rag_chat_app:
      name: "nsw-ev-rag-chat-${bundle.target}"
      description: "RAG-powered chat interface for NSW EV Intelligence queries"
      resources:
        - name: main
          description: "Main RAG chat application"
          python:
            src: ${workspace.file_path}/rag_app.py
            handler: app
      config:
        env:
          - name: INDEX_NAME
            value: mobility_ai.rag.ev_documents_index
          - name: LLM_ENDPOINT
            value: databricks-meta-llama-3-3-70b-instruct
          - name: TOP_K
            value: "5"
  
  pipelines:
    bronze_ingestion:
      name: "nsw-ev-bronze-pipeline-${bundle.target}"
      catalog: "${var.catalog}"
      target: "${var.catalog}.bronze"
      continuous: false
      development: true
      photon: true
      channel: "CURRENT"
      
      libraries:
        - notebook:
            path: "./nsw-ev-intelligence/pipelines/bronze_ingestion.py"
      
      clusters:
        - label: "default"
          autoscale:
            min_workers: 1
            max_workers: 3
          node_type_id: "i3.xlarge"
          spark_version: "13.3.x-scala2.12"
          aws_attributes:
            availability: "SPOT_WITH_FALLBACK"
      
      configuration:
        "pipelines.clusterShutdown.delay": "30m"
