# NSW EV Intelligence - Medallion Pipeline (Parallel Mode)
# Lakeflow Spark Declarative Pipeline running alongside existing notebook ETL

resources:
  pipelines:
    medallion_pipeline_parallel:
      name: "nsw-ev-medallion-parallel-${bundle.target}"
      
      # Unity Catalog configuration
      catalog: "${var.catalog}"
      target: "${var.catalog}"
      
      # Pipeline mode
      continuous: false  # Triggered mode for parallel testing
      development: true  # Enable development mode features
      photon: true       # Enable Photon acceleration
      channel: "PREVIEW" # Use preview channel for latest DLT features
      
      # Pipeline notebook
      libraries:
        - notebook:
            path: "${workspace.file_path}/nsw-ev-intelligence/pipelines/nsw_ev_medallion_pipeline_parallel.py"
      
      # Compute configuration
      clusters:
        - label: "default"
          autoscale:
            min_workers: 1
            max_workers: 3
          # Serverless is recommended for DLT, but you can specify node type for dedicated clusters
          # node_type_id: "i3.xlarge"  # Uncomment for dedicated cluster
      
      # Pipeline configuration
      configuration:
        # Auto-optimization settings
        "pipelines.autoOptimize.managed": "true"
        "pipelines.autoOptimize.zOrderCols": "station_id,latitude,longitude"
        
        # Cluster shutdown delay to reduce startup time
        "pipelines.clusterShutdown.delay": "30m"
        
        # Schema evolution
        "spark.databricks.delta.schema.autoMerge.enabled": "true"
        
        # Streaming settings
        "spark.sql.streaming.metricsEnabled": "true"
        
        # Change Data Feed (for downstream consumption)
        "spark.databricks.delta.properties.defaults.enableChangeDataFeed": "true"
      
      # Storage location for pipeline metadata
      storage: "/pipelines/nsw-ev-medallion-parallel/${bundle.target}"
      
      # Notifications (optional)
      # notifications:
      #   - email_recipients:
      #       - "your-email@example.com"
      #     alerts:
      #       - "on-update-failure"
      #       - "on-update-fatal-failure"
